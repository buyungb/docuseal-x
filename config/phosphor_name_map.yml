# Phosphor Duotone icon map
#
# Used by:
#   script/rebuild_icon_partials.rb       (ERB: app/views/icons/_<key>.html.erb)
#   script/migrate_vue_icon_imports.rb    (Vue: @tabler/icons-vue IconXxx -> @phosphor-icons/vue PhYyy)
#
# Key:
#   snake_case name of the current Tabler icon. For ERB, this matches the partial
#   base name (app/views/icons/_<key>.html.erb). For Vue, this matches the snake_case
#   conversion of the Tabler PascalCase import (IconWritingSign -> writing_sign).
#
# Entry:
#   phosphor:       <kebab-case-name>   must exist at
#                   node_modules/@phosphor-icons/core/assets/duotone/<name>-duotone.svg
#   accent:         (optional) Tailwind class applied to the duotone fill layer (20% opacity body).
#                   Leave blank to inherit the current icon color via currentColor.
#   keep_existing:  true  -- skip both scripts; keep the hand-crafted partial / import as-is
#                            (used for OAuth brand marks that require official multi-color logos).

# =====================================================================
# ERB partials (app/views/icons/_*.html.erb)
# =====================================================================

