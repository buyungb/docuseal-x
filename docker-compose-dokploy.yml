services:
  docuseal:
    image: buyungbahari/docuseal-x:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_started
    environment:
      # Internal DB connection (docker network)
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/docuseal

      # Gotenberg for DOCX to PDF conversion
      GOTENBERG_URL: http://gotenberg:3000

      # IMPORTANT: Set a persistent SECRET_KEY_BASE to avoid re-setup after deploy
      # Generate with: openssl rand -hex 64
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-your_secret_key_here_replace_with_64_hex_chars}

      # Public hostname (api.sealroute.com). Read by lib/docuseal.rb and used
      # to build absolute URLs in emails, webhooks, signing links, etc.
      HOST: ${HOST}
      APP_URL: https://${HOST}

      # Traefik terminates TLS, so tell Rails the request is already HTTPS and
      # enable force_ssl for the HTTP -> HTTPS redirect inside the app.
      FORCE_SSL: "true"
    volumes:
      - docuseal_data:/data/docuseal

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/up >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

    # Do NOT expose ports in Dokploy (Traefik handles routing)
    # ports:
    #   - "3000:3000"

    labels:
      - "traefik.enable=true"

      # HTTPS router on ${HOST} (e.g. api.sealroute.com)
      - "traefik.http.routers.docuseal.rule=Host(`${HOST}`)"
      - "traefik.http.routers.docuseal.entrypoints=websecure"
      - "traefik.http.routers.docuseal.tls=true"
      - "traefik.http.routers.docuseal.tls.certresolver=letsencrypt"
      - "traefik.http.routers.docuseal.service=docuseal"

      # HTTP router -> redirect to HTTPS (so http://api.sealroute.com/api-docs works)
      - "traefik.http.routers.docuseal-http.rule=Host(`${HOST}`)"
      - "traefik.http.routers.docuseal-http.entrypoints=web"
      - "traefik.http.routers.docuseal-http.middlewares=docuseal-redirect"
      - "traefik.http.middlewares.docuseal-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.docuseal-redirect.redirectscheme.permanent=true"

      # Internal container port
      - "traefik.http.services.docuseal.loadbalancer.server.port=3000"

    networks:
      - dokploy-network
      - internal

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docuseal
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d docuseal"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # Gotenberg: DOCX/DOC -> PDF conversion service
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--api-timeout=60s"
      - "--libreoffice-restart-after=10"
    networks:
      - internal

networks:
  # Traefik network managed by Dokploy (must already exist)
  dokploy-network:
    external: true

  # Internal network between services (not exposed)
  internal:
    driver: bridge

# Named volumes for persistent data across deployments
volumes:
  docuseal_data:
    driver: local
  pg_data:
    driver: local
