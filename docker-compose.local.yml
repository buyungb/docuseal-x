services:
  app:
    image: ${APP_IMAGE:-buyungbahari/docuseal-x:latest}
    pull_policy: ${APP_PULL_POLICY:-always}
    container_name: docuseal-app
    depends_on:
      postgres:
        condition: service_healthy
    # Run as root for local dev so /tmp, /app, and /data/docuseal are
    # always writable regardless of how the prebuilt image was layered.
    # Production deployments (e.g. Dokploy) can keep the default user.
    user: "0:0"
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - docuseal_data:/data/docuseal
    tmpfs:
      - /tmp:rw,size=256m,mode=1777
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/docuseal
      RAILS_ENV: production
      WORKDIR: /data/docuseal
      TMPDIR: /tmp
      HOME: /root
    # Wrap the default CMD so we (a) make sure /tmp + /data/docuseal are
    # writable, then (b) exec the image's normal Puma command. We don't
    # override entrypoint so any baked-in entrypoint scripts still run.
    command:
      - /bin/sh
      - -c
      - |
        set -e
        chmod 1777 /tmp 2>/dev/null || true
        mkdir -p /data/docuseal /app/tmp /app/log
        chmod -R u+rwX /data/docuseal /app/tmp /app/log 2>/dev/null || true
        exec /app/bin/bundle exec puma -C /app/config/puma.rb --dir /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: docuseal-postgres
    volumes:
      - docuseal_pg:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: docuseal
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  docuseal_data:
    driver: local
  docuseal_pg:
    driver: local